name: Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - catalog-service
          - eureka-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Java 21 (matches your pom.xml)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ✅ Build EACH service (since no root pom)
      - name: Build service
        run: |
          cd spring-boot-ecommerce-advanced-main/${{ matrix.service }}
          mvn clean package -DskipTests

      # ✅ Upload JAR (downloadable)
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: spring-boot-ecommerce-advanced-main/${{ matrix.service }}/target/*.jar

      # ✅ Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest \
          ./spring-boot-ecommerce-advanced-main/${{ matrix.service }}

      # ✅ Push Docker image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
`
